<!-- ═══════════════ confirm_delete_company.html ═══════════════ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete {{ company.name }}?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:#F8FAFC;color:#0F172A;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:20px;padding:36px;max-width:440px;width:100%;text-align:center;}
.danger-icon{font-size:48px;margin-bottom:16px;}
.card-title{font-size:22px;font-weight:800;margin-bottom:10px;letter-spacing:-0.3px;}
.card-sub{font-size:14px;color:#64748B;line-height:1.6;margin-bottom:24px;}
.company-name{font-weight:800;color:#0F172A;}
.warning-box{background:rgba(244,63,94,0.07);border:1px solid rgba(244,63,94,0.2);border-radius:12px;padding:14px 16px;font-size:13px;color:#BE123C;font-weight:600;margin-bottom:24px;text-align:left;}
.btn-row{display:flex;gap:10px;justify-content:center;}
.btn{display:inline-flex;align-items:center;padding:10px 24px;border-radius:30px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;border:1px solid rgba(0,0,0,0.14);background:transparent;color:#0F172A;cursor:pointer;text-decoration:none;transition:all 0.15s;}
.btn:hover{background:#F8FAFC;}
.btn.red{background:linear-gradient(135deg,#ff5f5f,#ff3b3b);color:#fff;border-color:transparent;}
.btn.red:hover{opacity:0.9;}
</style>
</head>
<body>
<div class="card">
  <div class="danger-icon">⚠️</div>
  <div class="card-title">Delete Company?</div>
  <div class="card-sub">You are about to permanently delete <span class="company-name">{{ company.name }}</span>. This action cannot be undone.</div>
  <div class="warning-box">
    ⚡ This will NOT delete the devices assigned to this company — they will simply become unassigned.
  </div>
  <div class="btn-row">
    <a href="{% url 'company_detail' company.pk %}" class="btn">Cancel</a>
    <form method="post" style="display:inline;">
      {% csrf_token %}
      <button type="submit" class="btn red">Yes, Delete Company</button>
    </form>
  </div>
</div>
</body>
</html>
